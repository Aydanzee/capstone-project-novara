name: Capstone Validation

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check Terraform formatting
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Initialize Terraform without backend
        working-directory: terraform
        run: terraform init -backend=false

      - name: Validate Terraform configuration
        working-directory: terraform
        run: terraform validate

  kubernetes:
    name: Kubernetes manifest validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Render base manifests
        run: kubectl kustomize k8s/base

      - name: Render AWS overlay manifests
        run: kubectl kustomize k8s/overlays/aws

  docker:
    name: Docker build validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build --platform linux/amd64 -t taskapp-backend:test ./taskapp_backend

      - name: Build frontend image
        run: docker build --platform linux/amd64 --build-arg VITE_API_URL=/api -t taskapp-frontend:test ./taskapp_frontend

  optional-security-scan:
    name: Optional IaC and security scan
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        continue-on-error: true

      - name: Set up TFLint
        uses: terraform-linters/setup-tflint@v4
        continue-on-error: true

      - name: Initialize TFLint
        working-directory: terraform
        continue-on-error: true
        run: tflint --init || true

      - name: Run TFLint
        working-directory: terraform
        continue-on-error: true
        run: tflint --recursive || true

      - name: Run Trivy config scan
        continue-on-error: true
        run: docker run --rm -v "$PWD:/workspace" aquasec/trivy:latest config /workspace --severity HIGH,CRITICAL --exit-code 0 --no-progress || true

      - name: Finish optional security scan
        run: echo "Optional security scan completed. Findings are advisory only."
