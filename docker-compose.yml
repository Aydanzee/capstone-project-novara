services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: taskapp
      POSTGRES_USER: taskapp_user
      POSTGRES_PASSWORD: taskapp_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskapp_user -d taskapp"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./taskapp_backend
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_NAME: taskapp
      DATABASE_USER: taskapp_user
      DATABASE_PASSWORD: taskapp_password
      SECRET_KEY: local-compose-secret-change-for-production
      PORT: "5000"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5001:5000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health', timeout=5)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./taskapp_frontend
      args:
        VITE_API_URL: /api
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
