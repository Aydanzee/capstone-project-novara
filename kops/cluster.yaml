apiVersion: kops.k8s.io/v1alpha2
kind: Cluster
metadata:
  name: k8s.axiomdlabs.online
spec:
  api:
    loadBalancer:
      class: Network
      type: Public
  authorization:
    rbac: {}
  channel: stable
  cloudProvider: aws
  configBase: s3://capstone-project-novara-dev-kops-state-027355625786-us-east-1/k8s.axiomdlabs.online
  dnsZone: axiomdlabs.online
  etcdClusters:
  - cpuRequest: 200m
    etcdMembers:
    - encryptedVolume: true
      instanceGroup: control-plane-us-east-1a
      name: a
    - encryptedVolume: true
      instanceGroup: control-plane-us-east-1b
      name: b
    - encryptedVolume: true
      instanceGroup: control-plane-us-east-1c
      name: c
    manager:
      backupRetentionDays: 90
    memoryRequest: 100Mi
    name: main
  - cpuRequest: 100m
    etcdMembers:
    - encryptedVolume: true
      instanceGroup: control-plane-us-east-1a
      name: a
    - encryptedVolume: true
      instanceGroup: control-plane-us-east-1b
      name: b
    - encryptedVolume: true
      instanceGroup: control-plane-us-east-1c
      name: c
    manager:
      backupRetentionDays: 90
    memoryRequest: 100Mi
    name: events
  iam:
    allowContainerRegistry: true
    legacy: false
  kubeProxy:
    enabled: false
  kubelet:
    anonymousAuth: false
  kubernetesApiAccess:
  - 105.127.11.60/32
  - 146.70.65.207/32
  kubernetesVersion: 1.35.5
  masterPublicName: api.k8s.axiomdlabs.online
  networkCIDR: 10.20.0.0/16
  networkID: vpc-064ae70015dab3d97
  networking:
    cilium:
      enableNodePort: true
  nonMasqueradeCIDR: 100.64.0.0/10
  sshAccess:
  - 105.127.11.60/32
  - 146.70.65.207/32
  subnets:
  - cidr: 10.20.10.0/24
    id: subnet-07dd98d50728314a1
    name: us-east-1a
    type: Private
    zone: us-east-1a
  - cidr: 10.20.11.0/24
    id: subnet-001a2af2336bcb8da
    name: us-east-1b
    type: Private
    zone: us-east-1b
  - cidr: 10.20.12.0/24
    id: subnet-0e81291f42124b49a
    name: us-east-1c
    type: Private
    zone: us-east-1c
  - cidr: 10.20.0.0/24
    id: subnet-04770f6b7d12fdf06
    name: utility-us-east-1a
    type: Utility
    zone: us-east-1a
  - cidr: 10.20.1.0/24
    id: subnet-036891e37bae84f79
    name: utility-us-east-1b
    type: Utility
    zone: us-east-1b
  - cidr: 10.20.2.0/24
    id: subnet-0f6cd50354f229c64
    name: utility-us-east-1c
    type: Utility
    zone: us-east-1c
  topology:
    bastion:
      bastionPublicName: bastion.k8s.axiomdlabs.online
    dns:
      type: Public

---

apiVersion: kops.k8s.io/v1alpha2
kind: InstanceGroup
metadata:
  labels:
    kops.k8s.io/cluster: k8s.axiomdlabs.online
  name: control-plane-us-east-1a
spec:
  image: 099720109477/ubuntu/images/hvm-ssd-gp3/ubuntu-noble-24.04-amd64-server-20260218
  machineType: t3.small
  maxSize: 1
  minSize: 1
  role: Master
  rootVolumeSize: 20
  subnets:
