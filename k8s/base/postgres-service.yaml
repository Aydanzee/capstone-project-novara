apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: taskapp
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: taskapp
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: taskapp
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
